version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: github-insights-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - github-insights

  # Backend API (.NET)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: github-insights-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Redis=redis:6379
      - GitHub__Token=${GITHUB_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - github-insights
    restart: unless-stopped

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: github-insights-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - github-insights
    restart: unless-stopped

networks:
  github-insights:
    driver: bridge

volumes:
  redis-data:
